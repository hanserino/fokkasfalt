title: FØKK ASFALT
description: "Norges ledende podcast om fjelløping, ultraløping og stiløping."
url: "https://fokkasfalt.no"
baseurl: ""
lang: nb

# GA4 måle-ID (gtag.js). Finn under Admin → Datastrømmer i Google Analytics. Tom = ingen tracking.
google_analytics: ""

# Offentlige lytte-lenker (show-nivå) — brukes når episode matcher «also_free» i episode_availability.yml
# (Nøkkel «listen_links» unngår konflikt med Liquid/site — ikke bruk nøkkelen «listen».)
listen_links:
  spotify_show: "https://open.spotify.com/show/1s8OvAXNcqRa6oncqakhdg?si=95721a9072c34c67"
  apple_show: "https://podcasts.apple.com/no/podcast/f-k-asfalt-n%C3%A5-er-det-alvor/id1332829214"

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - scripts
  - .github
  - .env
  - .env.example
  - .cursor

collections:
  episodes:
    output: true
    permalink: /episoder/:name/

defaults:
  - scope:
      path: ""
      type: "episodes"
    values:
      layout: episode
      og_type: article

# Giscus (GitHub Discussions-kommentarer på episoder). Verdier fra https://giscus.app
giscus:
  repo: hanserino/fokkasfalt
  repo_id: "R_kgDOSXg0eQ"
  category: "Episode-kommentar"
  category_id: "DIC_kwDOSXg0ec4C8811"
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: noborder_dark
  lang: en
