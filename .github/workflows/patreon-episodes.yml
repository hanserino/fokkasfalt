# Regenerates _episodes/*.md from Patreon RSS once per day. Jekyll (GitHub Pages) builds static HTML.
#
# Repository secrets:
#   PATREON_RSS_URL — full master RSS URL including query string (episode import)
#   SPOTIFY_CLIENT_ID / SPOTIFY_CLIENT_SECRET — optional; episode-specific Spotify links in _data/episode_availability.yml

name: Regenerate Patreon episodes

on:
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch_episodes.rb"
      - "scripts/import_buzzsprout_only_episodes.rb"
      - "scripts/generate_episode_thumbnails.rb"
      - "scripts/match_episode_availability.rb"
      - "scripts/buzzsprout_match_core.rb"
      - "scripts/listen_episode_resolver.rb"
      - ".github/workflows/patreon-episodes.yml"

concurrency:
  group: patreon-episodes
  cancel-in-progress: true

jobs:
  episodes:
    # Pinned runner reduces surprises vs ubuntu-latest (packages/IM delegates).
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          # google-protobuf 3.23.x (via sass-embedded / Jekyll) requires ruby < 3.3.dev on linux;
          # setup-ruby "3.3" resolves to 3.3.11 → bundle install exit 5. Bruk 3.2 til lockfile oppgraderes.
          ruby-version: "3.2"
          bundler: "2.5.23"
          bundler-cache: true
          # Bump after bundler/cache changes (invalidate corrupt installer cache).
          cache-version: 4

      - name: Install ImageMagick
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick

      - name: Verify ImageMagick (MiniMagick expects magick or convert on PATH)
        run: |
          set -eu
          if command -v magick >/dev/null 2>&1; then
            magick -version | head -1
          elif command -v convert >/dev/null 2>&1; then
            convert -version | head -1
          else
            echo "No magick or convert after apt install"; exit 1
          fi

      - name: Fetch RSS and write Jekyll collection files
        env:
          PATREON_RSS_URL: ${{ secrets.PATREON_RSS_URL }}
        run: |
          if [ -z "$PATREON_RSS_URL" ]; then
            echo "::warning::PATREON_RSS_URL is not configured — skip episode import."
            exit 0
          fi
          ruby scripts/fetch_episodes.rb

      - name: Import Buzzsprout-only episodes missing from arkivet
        run: ruby scripts/import_buzzsprout_only_episodes.rb

      - name: Generate episode list thumbnails (WebP)
        env:
          THUMB_HTTP_DELAY_MS: "35"
        run: bundle exec ruby scripts/generate_episode_thumbnails.rb

      - name: Regenerate episode availability (Buzzsprout match + listen URLs)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: ruby scripts/match_episode_availability.rb

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _episodes/ _data/episode_availability.yml assets/episode-thumbs/
          if git diff --staged --quiet; then
            echo "No changes to _episodes/ or _data/episode_availability.yml."
          else
            git commit -m "chore: refresh Patreon episodes and/or episode availability data"
            git push
          fi
