# Oppdaterer _data/giscus_comment_counts.yml fra GitHub Discussions (Giscus-kategori).
# Kjører ikke på hver push (unngår støy); bruk tidsplan eller manuell kjøring.

name: Giscus comment counts

on:
  workflow_dispatch:
  schedule:
    - cron: "25 6 * * *"

permissions:
  contents: write
  discussions: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hent kommentartelling
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/fetch_giscus_comment_counts.rb

      - name: Commit og push ved endring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/giscus_comment_counts.yml
          if git diff --staged --quiet; then
            echo "Ingen endring i kommentartelling."
            exit 0
          fi
          git commit -m "Oppdater Giscus-kommentartelling"
          git push
